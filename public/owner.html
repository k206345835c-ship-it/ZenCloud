<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>ZenCloud Owner Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Panel Właściciela</h2>
<div id="discounts"></div>
<script>
async function loadDiscounts(){
  const res = await fetch("/api/discounts");
  const data = await res.json();
  document.getElementById("discounts").innerText = JSON.stringify(data,null,2);
}
loadDiscounts();
</script>
</body>
</html>
